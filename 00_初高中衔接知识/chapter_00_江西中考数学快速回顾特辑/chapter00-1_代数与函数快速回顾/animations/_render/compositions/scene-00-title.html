<template id="scene-00-title-template">
  <div data-composition-id="scene-00-title" data-width="1920" data-height="1080">
    <div class="panel">
      <div class="middle">
        <div class="stage-block"></div>
        <div class="middle-inner">
          <div class="badge">
            <span class="dot"></span>
            <span>中考特辑</span>
            <span class="dot"></span>
          </div>
          <h1 class="headline">
            <span class="row">
              <span class="ch accent-pink">中考数学</span>
              <span class="ch">核心考点</span>
            </span>
            <span class="row sub-row">
              <span class="ch accent-blue">—— 代数与函数 ——</span>
            </span>
          </h1>
          <div class="stroke"></div>
          <div class="chips">
            <div class="chip c1">代数</div>
            <div class="chip c2">函数</div>
          </div>
        </div>
      </div>
    </div>

    <style>
      [data-composition-id="scene-00-title"] {
        --bg: #fff7e8; --ink: #1a1a1a;
        --pink: #ff1493; --blue: #0047ab;
        --yellow: #ffe000; --green: #009b77;
        --paper: #ffffff;
        position: relative; width: 1920px; height: 1080px;
        overflow: hidden; background: var(--bg);
        font-family: "Nunito", "Noto Sans SC", sans-serif; color: var(--ink);
      }
      [data-composition-id="scene-00-title"] .panel {
        position: absolute; inset: 0; background: var(--bg); overflow: hidden;
      }
      [data-composition-id="scene-00-title"] .middle {
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 0 96px; gap: 28px;
      }
      [data-composition-id="scene-00-title"] .stage-block {
        position: absolute;
        background: var(--paper); border: 6px solid var(--ink);
        border-radius: 36px; box-shadow: 18px 18px 0 0 var(--ink);
        left: 60px; right: 60px; top: 60px; bottom: 60px;
        z-index: 0; opacity: 0;
      }
      [data-composition-id="scene-00-title"] .middle-inner {
        position: relative; z-index: 2;
        display: flex; flex-direction: column;
        align-items: center; gap: 32px;
      }
      [data-composition-id="scene-00-title"] .badge {
        display: inline-flex; align-items: center; gap: 18px;
        padding: 16px 40px; background: var(--blue); color: var(--yellow);
        border-radius: 9999px; border: 5px solid var(--ink);
        font-family: "ZCOOL KuaiLe", "Nunito", sans-serif;
        font-weight: 700; font-size: 44px; letter-spacing: 0.16em; opacity: 0;
      }
      [data-composition-id="scene-00-title"] .badge .dot {
        width: 18px; height: 18px; border-radius: 50%;
        background: var(--pink); border: 3px solid var(--ink);
      }
      [data-composition-id="scene-00-title"] .headline {
        font-family: "ZCOOL KuaiLe", "Noto Sans SC", sans-serif;
        font-weight: 700; font-size: 100px; line-height: 1.2;
        text-align: center; color: var(--ink); margin: 0;
        display: flex; flex-direction: column; align-items: center; gap: 4px;
      }
      [data-composition-id="scene-00-title"] .headline .row {
        display: flex; justify-content: center; gap: 6px;
        opacity: 0; transform: translateY(30px);
      }
      [data-composition-id="scene-00-title"] .headline .ch { display: inline-block; }
      [data-composition-id="scene-00-title"] .headline .ch.accent-pink { color: var(--pink); }
      [data-composition-id="scene-00-title"] .headline .ch.accent-blue { color: var(--blue); }
      [data-composition-id="scene-00-title"] .headline .sub-row { font-size: 64px; margin-top: 8px; }
      [data-composition-id="scene-00-title"] .stroke {
        width: 700px; height: 16px; background: var(--yellow);
        border-radius: 8px; border: 4px solid var(--ink);
        transform-origin: left center; transform: scaleX(0); margin-top: -8px;
      }
      [data-composition-id="scene-00-title"] .chips {
        display: flex; gap: 22px; justify-content: center;
      }
      [data-composition-id="scene-00-title"] .chip {
        font-family: "Fredoka", "Noto Sans SC", sans-serif;
        font-weight: 700; font-size: 40px; padding: 14px 32px;
        border-radius: 20px; border: 5px solid var(--ink);
        box-shadow: 10px 10px 0 0 var(--ink); opacity: 0;
      }
      [data-composition-id="scene-00-title"] .chip.c1 { background: var(--pink); color: var(--paper); }
      [data-composition-id="scene-00-title"] .chip.c2 { background: var(--yellow); color: var(--ink); }
    </style>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true, defaults: { ease: "back.out(1.7)" } });

        tl.from(".panel", { scaleY: 0, transformOrigin: "50% 50%", duration: 0.45, ease: "back.out(1.6)" }, 0);
        tl.to(".stage-block", { opacity: 1, duration: 0.55, ease: "power2.out" }, 0.05);
        tl.fromTo(".badge",
          { opacity: 0, y: -50, scale: 0.4, rotate: -8 },
          { opacity: 1, y: 0, scale: 1, rotate: 0, duration: 0.5, ease: "back.out(2)" }, 0.2);
        tl.to(".headline .row",
          { opacity: 1, y: 0, duration: 0.4, stagger: 0.2, ease: "back.out(1.8)" }, 0.6);
        tl.to(".stroke", { scaleX: 1, duration: 0.4, ease: "power3.out" }, 1.5);
        tl.fromTo(".chip",
          { opacity: 0, y: 50, scale: 0.5, rotate: -6 },
          { opacity: 1, y: 0, scale: 1, rotate: 0, duration: 0.45, stagger: 0.08, ease: "back.out(2.2)" }, 2.0);
        tl.to(".chip", { scale: 1.06, duration: 0.18, yoyo: true, repeat: 1, ease: "sine.inOut" }, 3.0);

        tl.to({}, { duration: 0.01 }, 6.09);
        window.__timelines["scene-00-title"] = tl;
      })();
    </script>
  </div>
</template>
