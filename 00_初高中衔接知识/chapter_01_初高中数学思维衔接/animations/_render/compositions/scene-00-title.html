<template id="scene-00-title-template">
  <div
    data-composition-id="scene-00-title"
    data-width="1080"
    data-height="1920"
  >
    <div class="panel">
      <div class="rays top"></div>
      <div class="rays bottom"></div>

      <div class="corner tl">
        <div class="tile t-pink"></div>
        <div class="tile t-yellow"></div>
      </div>
      <div class="corner tr">
        <div class="tile t-blue"></div>
        <div class="tile t-green"></div>
      </div>
      <div class="corner bl">
        <div class="tile t-green"></div>
        <div class="tile t-pink"></div>
      </div>
      <div class="corner br">
        <div class="tile t-yellow"></div>
        <div class="tile t-blue"></div>
      </div>

      <div class="middle">
        <div class="stage-block"></div>

        <div class="middle-inner">
          <div class="badge">
            <span class="dot"></span>
            <span>CHAPTER &middot; 01</span>
            <span class="dot"></span>
          </div>

          <h1 class="headline">
            <span class="row">
              <span class="ch accent-pink">什</span>
              <span class="ch">么</span>
              <span class="ch accent-blue">是</span>
              <span class="ch">高</span>
              <span class="ch accent-green">中</span>
            </span>
            <span class="row">
              <span class="ch accent-green">数</span>
              <span class="ch">学</span>
              <span class="ch accent-pink">思</span>
              <span class="ch">维</span>
              <span class="ch accent-blue">？</span>
            </span>
          </h1>
          <div class="stroke"></div>

          <div class="chips">
            <div class="chip c1">函数</div>
            <div class="chip c2">对象</div>
            <div class="chip c3">性质</div>
          </div>
        </div>
      </div>
    </div>

    <style>
      [data-composition-id="scene-00-title"] {
        --bg: #fff7e8;
        --ink: #1a1a1a;
        --pink: #ff1493;
        --blue: #0047ab;
        --yellow: #ffe000;
        --green: #009b77;
        --paper: #ffffff;

        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: transparent;
        font-family: "Nunito", "Noto Sans SC", sans-serif;
        color: var(--ink);
      }

      [data-composition-id="scene-00-title"] .panel {
        position: absolute;
        top: 480px;
        left: 0;
        right: 0;
        height: 960px;
        background: var(--bg);
        overflow: hidden;
      }

      [data-composition-id="scene-00-title"] .corner {
        position: absolute;
        display: flex;
        gap: 18px;
        opacity: 0;
      }
      [data-composition-id="scene-00-title"] .corner.tl { top: 36px; left: 40px; }
      [data-composition-id="scene-00-title"] .corner.tr { top: 36px; right: 40px; flex-direction: row-reverse; }
      [data-composition-id="scene-00-title"] .corner.bl { bottom: 36px; left: 40px; }
      [data-composition-id="scene-00-title"] .corner.br { bottom: 36px; right: 40px; flex-direction: row-reverse; }

      [data-composition-id="scene-00-title"] .tile {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        position: relative;
      }
      [data-composition-id="scene-00-title"] .tile::before,
      [data-composition-id="scene-00-title"] .tile::after {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: 50%;
      }
      [data-composition-id="scene-00-title"] .tile.t-pink { background: var(--pink); }
      [data-composition-id="scene-00-title"] .tile.t-pink::before { background: var(--yellow); }
      [data-composition-id="scene-00-title"] .tile.t-pink::after { inset: 20px; background: var(--ink); }
      [data-composition-id="scene-00-title"] .tile.t-blue { background: var(--blue); }
      [data-composition-id="scene-00-title"] .tile.t-blue::before { background: var(--paper); }
      [data-composition-id="scene-00-title"] .tile.t-blue::after { inset: 20px; background: var(--pink); }
      [data-composition-id="scene-00-title"] .tile.t-green { background: var(--green); }
      [data-composition-id="scene-00-title"] .tile.t-green::before { background: var(--yellow); }
      [data-composition-id="scene-00-title"] .tile.t-green::after { inset: 20px; background: var(--blue); }
      [data-composition-id="scene-00-title"] .tile.t-yellow { background: var(--yellow); }
      [data-composition-id="scene-00-title"] .tile.t-yellow::before { background: var(--pink); }
      [data-composition-id="scene-00-title"] .tile.t-yellow::after { inset: 20px; background: var(--green); }

      [data-composition-id="scene-00-title"] .rays {
        position: absolute;
        left: 50%;
        width: 1080px;
        height: 110px;
        transform: translateX(-50%);
        opacity: 0;
        pointer-events: none;
      }
      [data-composition-id="scene-00-title"] .rays.top { top: 0; }
      [data-composition-id="scene-00-title"] .rays.bottom {
        bottom: 0;
        transform: translateX(-50%) rotate(180deg);
      }
      [data-composition-id="scene-00-title"] .ray {
        position: absolute;
        bottom: 0;
        left: 50%;
        width: 8px;
        border-radius: 4px;
        transform-origin: 50% 100%;
      }

      [data-composition-id="scene-00-title"] .middle {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 0 96px;
        gap: 40px;
      }

      [data-composition-id="scene-00-title"] .stage-block {
        position: absolute;
        background: var(--paper);
        border: 6px solid var(--ink);
        border-radius: 36px;
        box-shadow: 18px 18px 0 0 var(--ink);
        left: 60px; right: 60px; top: 60px; bottom: 60px;
        z-index: 0;
        transform: scale(0.7) rotate(-4deg);
        opacity: 0;
      }

      [data-composition-id="scene-00-title"] .middle-inner {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 48px;
      }

      [data-composition-id="scene-00-title"] .badge {
        display: inline-flex;
        align-items: center;
        gap: 18px;
        padding: 20px 44px;
        background: var(--blue);
        color: var(--yellow);
        border-radius: 9999px;
        border: 5px solid var(--ink);
        font-family: "Fredoka", "Nunito", sans-serif;
        font-weight: 700;
        font-size: 52px;
        letter-spacing: 0.16em;
        opacity: 0;
      }
      [data-composition-id="scene-00-title"] .badge .dot {
        width: 20px; height: 20px; border-radius: 50%;
        background: var(--pink); border: 3px solid var(--ink);
      }

      [data-composition-id="scene-00-title"] .headline {
        font-family: "ZCOOL KuaiLe", "Fredoka", "Noto Sans SC", sans-serif;
        font-weight: 700;
        font-size: 132px;
        line-height: 1.05;
        text-align: center;
        color: var(--ink);
        margin: 0;
      }
      [data-composition-id="scene-00-title"] .headline .row {
        display: flex;
        justify-content: center;
        gap: 4px;
      }
      [data-composition-id="scene-00-title"] .headline .ch {
        display: inline-block;
        opacity: 0;
        transform: translateY(40px) scale(0.6) rotate(-8deg);
      }
      [data-composition-id="scene-00-title"] .headline .ch.accent-pink { color: var(--pink); }
      [data-composition-id="scene-00-title"] .headline .ch.accent-blue { color: var(--blue); }
      [data-composition-id="scene-00-title"] .headline .ch.accent-green { color: var(--green); }

      [data-composition-id="scene-00-title"] .stroke {
        width: 540px;
        height: 18px;
        background: var(--yellow);
        border-radius: 9px;
        border: 4px solid var(--ink);
        transform-origin: left center;
        transform: scaleX(0);
        margin-top: -16px;
      }

      [data-composition-id="scene-00-title"] .chips {
        display: flex;
        gap: 22px;
        justify-content: center;
        flex-wrap: nowrap;
      }
      [data-composition-id="scene-00-title"] .chip {
        font-family: "Fredoka", "Noto Sans SC", sans-serif;
        font-weight: 700;
        font-size: 40px;
        padding: 18px 30px;
        border-radius: 24px;
        border: 5px solid var(--ink);
        box-shadow: 10px 10px 0 0 var(--ink);
        white-space: nowrap;
        opacity: 0;
      }
      [data-composition-id="scene-00-title"] .chip.c1 { background: var(--pink); color: var(--paper); }
      [data-composition-id="scene-00-title"] .chip.c2 { background: var(--yellow); color: var(--ink); }
      [data-composition-id="scene-00-title"] .chip.c3 { background: var(--green); color: var(--paper); }
    </style>

    <script>
      (function () {
        const root = document.querySelector('[data-composition-id="scene-00-title"]');
        if (!root) return;

        // 装饰射线（避开模板字面量选择器，hyperframes lint 会拒绝）
        const rayColors = ["#FF1493", "#0047AB", "#FFE000", "#009B77", "#1a1a1a"];
        const rayHostTop = root.querySelector(".rays.top");
        const rayHostBot = root.querySelector(".rays.bottom");
        [rayHostTop, rayHostBot].forEach((host) => {
          const count = 11;
          for (let i = 0; i < count; i++) {
            const ray = document.createElement("div");
            ray.className = "ray";
            ray.style.background = rayColors[i % rayColors.length];
            const angle = -60 + (120 / (count - 1)) * i;
            const len = 80 + (i % 3) * 40;
            ray.style.height = len + "px";
            ray.style.transform = "translateX(-50%) rotate(" + angle + "deg)";
            host.appendChild(ray);
          }
        });

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true, defaults: { ease: "back.out(1.7)" } });

        tl.from(".panel", { scaleY: 0, transformOrigin: "50% 50%", duration: 0.45, ease: "back.out(1.6)" }, 0);
        tl.to(".corner", { opacity: 1, duration: 0.25, ease: "power2.out" }, 0.1);
        tl.from(".corner .tile", { scale: 0, opacity: 0, duration: 0.45, stagger: 0.05, ease: "back.out(2)" }, 0.1);

        tl.to(".rays.top, .rays.bottom", { opacity: 0.9, duration: 0.3 }, 0.15);
        tl.from(".rays.top .ray, .rays.bottom .ray", { scaleY: 0, transformOrigin: "50% 100%", duration: 0.45, stagger: 0.015, ease: "power3.out" }, 0.15);

        tl.to(".stage-block", { opacity: 1, scale: 1, rotate: 0, duration: 0.55, ease: "back.out(1.5)" }, 0.05);

        tl.fromTo(".badge",
          { opacity: 0, y: -50, scale: 0.4, rotate: -8 },
          { opacity: 1, y: 0, scale: 1, rotate: 0, duration: 0.5, ease: "back.out(2)" },
          0.2
        );

        tl.to(".headline .row:nth-child(1) .ch",
          { opacity: 1, y: 0, scale: 1, rotate: 0, duration: 0.5, stagger: 0.045, ease: "back.out(2)" },
          0.35
        );
        tl.to(".headline .row:nth-child(2) .ch",
          { opacity: 1, y: 0, scale: 1, rotate: 0, duration: 0.5, stagger: 0.045, ease: "back.out(2)" },
          0.7
        );

        tl.to(".stroke", { scaleX: 1, duration: 0.4, ease: "power3.out" }, 1.1);

        tl.fromTo(".chip",
          { opacity: 0, y: 60, scale: 0.5, rotate: -6 },
          { opacity: 1, y: 0, scale: 1, rotate: 0, duration: 0.45, stagger: 0.08, ease: "back.out(2.2)" },
          1.3
        );

        tl.to(".chip", { scale: 1.06, duration: 0.18, yoyo: true, repeat: 1, ease: "sine.inOut" }, 1.8);

        // 占满 3s
        tl.to({}, { duration: 0.01 }, 2.99);

        window.__timelines["scene-00-title"] = tl;
      })();
    </script>
  </div>
</template>
