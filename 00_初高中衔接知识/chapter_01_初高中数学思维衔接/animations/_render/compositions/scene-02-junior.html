<template id="scene-02-junior-template">
  <div
    data-composition-id="scene-02-junior"
    data-width="1080"
    data-height="1920"
  >
    <div class="panel">
      <div class="corner tl"><div class="tile t-green"></div></div>
      <div class="corner br"><div class="tile t-pink"></div></div>

      <div class="middle">
        <div class="badge">初 中 思 维</div>

        <!-- 因式分解链：令 y=0 → 式子分解 → (x-1)(x-3)=0 -->
        <div class="chain">
          <div class="step s-eq">
            <span class="expr"><span class="g2">y</span> = 0 &nbsp;即&nbsp; x<span class="sup">2</span> &minus; 4x + 3 = 0</span>
          </div>
          <div class="arrow">&darr; 因式分解</div>
          <div class="step s-factor">
            <span class="expr"><span class="g">(x &minus; 1)</span><span class="g2">(x &minus; 3)</span> = 0</span>
          </div>
        </div>

        <!-- 两个解 -->
        <div class="solns">
          <div class="sol s1">x = 1</div>
          <div class="or">或</div>
          <div class="sol s2">x = 3</div>
        </div>

        <!-- 数轴：标出 1 和 3 两点 -->
        <svg class="axis" viewBox="0 0 760 150" width="760" height="150">
          <line x1="40" y1="56" x2="720" y2="56" stroke="#1a1a1a" stroke-width="6" />
          <polygon points="720,56 698,44 698,68" fill="#1a1a1a" />
          <!-- x=1 在 200，x=3 在 480 -->
          <g class="tick-1">
            <circle cx="200" cy="56" r="20" fill="#ff1493" stroke="#1a1a1a" stroke-width="6" />
            <text x="200" y="138" text-anchor="middle" font-family="Fredoka" font-size="58" font-weight="700" fill="#ff1493">1</text>
          </g>
          <g class="tick-3">
            <circle cx="480" cy="56" r="20" fill="#009b77" stroke="#1a1a1a" stroke-width="6" />
            <text x="480" y="138" text-anchor="middle" font-family="Fredoka" font-size="58" font-weight="700" fill="#009b77">3</text>
          </g>
        </svg>
      </div>
    </div>

    <style>
      [data-composition-id="scene-02-junior"] {
        --bg: #fff7e8; --ink: #1a1a1a;
        --pink: #ff1493; --blue: #0047ab;
        --yellow: #ffe000; --green: #009b77;
        --paper: #ffffff;
        position: relative; width: 1080px; height: 1920px;
        overflow: hidden; background: transparent;
        font-family: "Nunito", "Noto Sans SC", sans-serif; color: var(--ink);
      }
      [data-composition-id="scene-02-junior"] .panel {
        position: absolute; top: 480px; left: 0; right: 0; height: 960px;
        background: var(--bg); overflow: hidden;
      }
      [data-composition-id="scene-02-junior"] .corner { position: absolute; opacity: 0; }
      [data-composition-id="scene-02-junior"] .corner.tl { top: 40px; left: 44px; }
      [data-composition-id="scene-02-junior"] .corner.br { bottom: 40px; right: 44px; }
      [data-composition-id="scene-02-junior"] .tile {
        width: 60px; height: 60px; border-radius: 50%; position: relative;
      }
      [data-composition-id="scene-02-junior"] .tile::after {
        content: ""; position: absolute; inset: 16px; border-radius: 50%; background: var(--ink);
      }
      [data-composition-id="scene-02-junior"] .tile.t-green { background: var(--green); }
      [data-composition-id="scene-02-junior"] .tile.t-pink { background: var(--pink); }

      [data-composition-id="scene-02-junior"] .middle {
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: flex-start;
        gap: 36px; padding: 50px 60px 60px;
      }
      [data-composition-id="scene-02-junior"] .badge {
        font-family: "ZCOOL KuaiLe", "Noto Sans SC", sans-serif;
        font-size: 80px; color: var(--paper);
        background: var(--green); padding: 16px 50px;
        border-radius: 30px; border: 5px solid var(--ink);
        letter-spacing: 0.16em; opacity: 0;
      }

      [data-composition-id="scene-02-junior"] .chain {
        display: flex; flex-direction: column; align-items: center; gap: 22px;
      }
      [data-composition-id="scene-02-junior"] .step {
        background: var(--paper);
        border: 6px solid var(--ink); border-radius: 28px;
        box-shadow: 12px 12px 0 0 var(--ink);
        padding: 26px 48px; opacity: 0;
      }
      [data-composition-id="scene-02-junior"] .expr {
        font-family: "Fredoka", "Noto Sans SC", sans-serif;
        font-weight: 700; font-size: 66px; color: var(--ink); white-space: nowrap;
      }
      [data-composition-id="scene-02-junior"] .s-eq .expr {
        font-size: 48px;
      }
      [data-composition-id="scene-02-junior"] .sup {
        font-size: 36px; vertical-align: super;
      }
      [data-composition-id="scene-02-junior"] .g { color: var(--pink); }
      [data-composition-id="scene-02-junior"] .g2 { color: var(--green); }
      [data-composition-id="scene-02-junior"] .arrow {
        font-family: "ZCOOL KuaiLe", "Noto Sans SC", sans-serif;
        font-size: 48px; color: var(--blue); opacity: 0;
      }

      [data-composition-id="scene-02-junior"] .solns {
        display: flex; align-items: center; gap: 30px;
      }
      [data-composition-id="scene-02-junior"] .sol {
        font-family: "Fredoka", "Noto Sans SC", sans-serif;
        font-weight: 700; font-size: 66px; color: var(--paper);
        padding: 14px 44px; border-radius: 24px;
        border: 5px solid var(--ink);
        box-shadow: 8px 8px 0 0 var(--ink);
        opacity: 0;
      }
      [data-composition-id="scene-02-junior"] .sol.s1 { background: var(--pink); }
      [data-composition-id="scene-02-junior"] .sol.s2 { background: var(--green); }
      [data-composition-id="scene-02-junior"] .or {
        font-family: "ZCOOL KuaiLe", "Noto Sans SC", sans-serif;
        font-size: 52px; color: var(--ink); opacity: 0;
      }

      [data-composition-id="scene-02-junior"] .axis { opacity: 0; }
      [data-composition-id="scene-02-junior"] .tick-1,
      [data-composition-id="scene-02-junior"] .tick-3 { opacity: 0; }
    </style>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.from(".panel", { scaleY: 0, transformOrigin: "50% 50%", duration: 0.5, ease: "back.out(1.5)" }, 0);
        tl.to(".corner", { opacity: 1, duration: 0.3, stagger: 0.08, ease: "power2.out" }, 0.2);

        tl.fromTo(".badge",
          { y: -40, scale: 0.6, opacity: 0 },
          { y: 0, scale: 1, opacity: 1, duration: 0.55, ease: "back.out(2)" },
          0.4
        );

        // 式子=0
        tl.fromTo(".s-eq",
          { y: 40, scale: 0.9, opacity: 0 },
          { y: 0, scale: 1, opacity: 1, duration: 0.55, ease: "back.out(1.7)" },
          1.2
        );
        // 箭头：因式分解
        tl.fromTo(".arrow",
          { y: -10, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" },
          2.4
        );
        // 因式分解结果
        tl.fromTo(".s-factor",
          { y: 40, scale: 0.9, opacity: 0 },
          { y: 0, scale: 1, opacity: 1, duration: 0.55, ease: "back.out(1.7)" },
          3.0
        );

        // 数轴线先出现（配音"也就是"约 6.3s）
        tl.to(".axis", { opacity: 1, duration: 0.4, ease: "power2.out" }, 6.4);

        // x = 1：念到"x 等于 1"的 x 时(约 6.7s) 解卡 + 数轴点出现
        tl.fromTo(".sol.s1",
          { x: -50, scale: 0.7, opacity: 0 },
          { x: 0, scale: 1, opacity: 1, duration: 0.5, ease: "back.out(2)" },
          6.7
        );
        tl.fromTo(".tick-1",
          { scale: 0.3, opacity: 0, transformOrigin: "200px 56px" },
          { scale: 1, opacity: 1, duration: 0.45, ease: "back.out(2.4)" },
          6.8
        );

        // "或"（配音"或者"约 8.1s）
        tl.fromTo(".or",
          { scale: 0.6, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.35, ease: "back.out(2)" },
          7.9
        );

        // x = 3：念到"x 等于 3"的 x 时(约 8.4s) 解卡 + 数轴点出现
        tl.fromTo(".sol.s2",
          { x: 50, scale: 0.7, opacity: 0 },
          { x: 0, scale: 1, opacity: 1, duration: 0.5, ease: "back.out(2)" },
          8.4
        );
        tl.fromTo(".tick-3",
          { scale: 0.3, opacity: 0, transformOrigin: "480px 56px" },
          { scale: 1, opacity: 1, duration: 0.45, ease: "back.out(2.4)" },
          8.5
        );

        tl.to({}, { duration: 0.01 }, 10.99);

        window.__timelines["scene-02-junior"] = tl;
      })();
    </script>
  </div>
</template>
