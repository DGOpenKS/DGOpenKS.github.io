      (function () {

        tl.from(".panel", { scaleY: 0, transformOrigin: "50% 50%", duration: 0.5, ease: "back.out(1.5)" }, 0);
        tl.to(".corner", { opacity: 1, duration: 0.3, stagger: 0.08, ease: "power2.out" }, 0.2);

        tl.fromTo(".badge",

          { y: 0, scale: 1, opacity: 1, duration: 0.55, ease: "back.out(2)" },
          0.4

        // 抛物线打底
        tl.fromTo(".graph",
          { y: 30, scale: 0.92, opacity: 0 },
          { y: 0, scale: 1, opacity: 1, duration: 0.6, ease: "back.out(1.6)" },
          1.3
        );

        // 正 (配音"结果为正"约 4.2s)
        tl.fromTo(".seg-pos-l, .seg-pos-r",
          { opacity: 0 },
          { opacity: 1, duration: 0.5, ease: "power2.out" },
          4.0
        );
        tl.fromTo(".a-pos",
          { y: 26, scale: 0.7, opacity: 0 },
          { y: 0, scale: 1, opacity: 1, duration: 0.45, ease: "back.out(2)" },
          4.0
        );

        // 负 (配音"结果为负"约 6.5s)
        tl.fromTo(".seg-neg",
          { opacity: 0 },
          { opacity: 1, duration: 0.5, ease: "power2.out" },
          6.3
        );
        tl.fromTo(".a-neg",
          { y: 26, scale: 0.7, opacity: 0 },
          { y: 0, scale: 1, opacity: 1, duration: 0.45, ease: "back.out(2)" },
          6.3
        );

        // 最小值 (配音"取到最小值"约 8.8s)：点从 x=3 处沿曲线滑到顶点

        tl.to(".vtx", { opacity: 1, duration: 0.3, ease: "power2.out" }, 8.5);
        // 沿曲线下滑 (3 -> 2 采样点) 到顶点
        tl.to(".vtx", {
          keyframes: {
            x: [440, 416, 392, 368, 344, 320],
            y: [330.4, 361.2, 385.1, 402.2, 412.4, 415.8],

          8.6

        tl.to({}, { duration: 0.01 }, 11.99);

        window.__timelines["scene-03-ask"] = tl;
