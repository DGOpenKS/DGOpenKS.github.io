    <style>
      [data-composition-id="scene-05-quadratic"] {
        --bg: #fff7e8; --ink: #1a1a1a;
        --pink: #ff1493; --blue: #0047ab;
        --yellow: #ffe000; --green: #009b77;
        --paper: #ffffff;
        position: relative; width: 1920px; height: 1080px;
        overflow: hidden; background: transparent;
        font-family: "Nunito", "Noto Sans SC", sans-serif; color: var(--ink);
      }
      [data-composition-id="scene-05-quadratic"] .panel {
        position: absolute; inset: 0; background: var(--bg);
      }
      [data-composition-id="scene-05-quadratic"] .content {
        position: absolute; inset: 0;
        display: flex; flex-direction: row;
        align-items: center; justify-content: center;
        gap: 80px; padding: 60px 80px;
      }
      [data-composition-id="scene-05-quadratic"] .left {
        flex: 0 0 auto;
        background: var(--paper); border: 5px solid var(--ink);

      [data-composition-id="scene-05-quadratic"] .grid-lines line {

      [data-composition-id="scene-05-quadratic"] .para-up { stroke: var(--blue); }
      [data-composition-id="scene-05-quadratic"] .sym-axis {
        stroke: var(--pink); stroke-width: 3; stroke-dasharray: 10 6; opacity: 0;

      [data-composition-id="scene-05-quadratic"] .sym-lbl {
        font-family: "Fredoka", sans-serif; font-size: 34px; font-weight: 700;
        fill: var(--pink); text-anchor: start; opacity: 0;
      }
      [data-composition-id="scene-05-quadratic"] .vertex-pt {
        fill: var(--yellow); stroke: var(--ink); stroke-width: 4; opacity: 0;
      }
      [data-composition-id="scene-05-quadratic"] .vertex-lbl {
        font-family: "Fredoka", sans-serif; font-size: 34px; font-weight: 700;
        fill: var(--ink); opacity: 0;
      }
      [data-composition-id="scene-05-quadratic"] .intercept-pt {
        fill: var(--green); stroke: var(--ink); stroke-width: 3; opacity: 0;
      }
      [data-composition-id="scene-05-quadratic"] .intercept-lbl {
        font-family: "Fredoka", sans-serif; font-size: 34px; font-weight: 700;

      [data-composition-id="scene-05-quadratic"] .lbl-down { fill: var(--pink); }

        border-radius: 20px; border: 5px solid var(--ink);
        letter-spacing: 0.10em; opacity: 0; align-self: flex-start;

        background: var(--paper); border: 5px solid var(--ink);
        border-radius: 24px; box-shadow: 10px 10px 0 0 var(--ink);
        padding: 24px 36px; display: flex; flex-direction: column; gap: 18px;
        opacity: 0;
      }
      [data-composition-id="scene-05-quadratic"] .info-title {
        font-family: "Fredoka", sans-serif; font-size: 48px; font-weight: 700;

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        var S = '[data-composition-id="scene-05-quadratic"]';
        var tl = gsap.timeline({ paused: true });

        tl.from(S + " .panel", { scaleY: 0, transformOrigin: "50% 50%", duration: 0.5, ease: "back.out(1.5)" }, 0);
        tl.fromTo(S + " .left", { opacity: 0, x: -40 }, { opacity: 1, x: 0, duration: 0.6, ease: "back.out(1.6)" }, 0.3);
        tl.fromTo(S + " .badge", { y: -20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, ease: "back.out(2)" }, 0.5);

        // Audio: "对于二次函数，其是一条抛物线，" (0 ~ 5s)
        tl.to(S + " .info-block", { opacity: 1, duration: 0.5, ease: "power2.out" }, 1.0);
        tl.to(S + " .para-up", { strokeDashoffset: 0, opacity: 1, duration: 2.0, ease: "power2.inOut" }, 2.0);

        // Audio: "对称轴为 x 等于负 b 除以 2a。" (5 ~ 8.4s)
        tl.to(S + " .sym-axis", { opacity: 1, duration: 0.5 }, 5.0);
        tl.to(S + " .sym-lbl", { opacity: 1, duration: 0.4 }, 5.4);
        tl.to(S + " .item-2", { opacity: 1, duration: 0.5, ease: "back.out(1.8)" }, 5.2);
        tl.to(S + " .vertex-pt", { opacity: 1, duration: 0.4 }, 6.5);
        tl.to(S + " .vertex-lbl", { opacity: 1, duration: 0.4 }, 6.7);
        tl.to(S + " .vertex-pt", { scale: 1.3, transformOrigin: "50% 50%", duration: 0.25, yoyo: true, repeat: 1, ease: "sine.inOut" }, 7.0);

        // Audio: "当 a 大于零，开口向上，有最小值；当 a 小于零，开口向下，有最大值。" (8.4 ~ 15.2s)
        tl.to(S + " .item-1", { opacity: 1, duration: 0.5, ease: "back.out(1.8)" }, 8.4);
        tl.to(S + " .lbl-down", { opacity: 1, duration: 0.4 }, 11.5);
        tl.to(S + " .item-1", { opacity: 1, duration: 0.5, ease: "back.out(1.8)" }, 8.4);
        tl.to(S + " .intercept-pt", { opacity: 1, duration: 0.4, stagger: 0.2 }, 12.0);
        tl.to(S + " .intercept-lbl", { opacity: 1, duration: 0.4, stagger: 0.2 }, 12.3);
        tl.to(S + " .item-3", { opacity: 1, duration: 0.5, ease: "back.out(1.8)" }, 12.0);

        tl.to({}, { duration: 0.01 }, 21.99);
        window.__timelines["scene-05-quadratic"] = tl;
      })();
    </script>
  </div>
</template>
