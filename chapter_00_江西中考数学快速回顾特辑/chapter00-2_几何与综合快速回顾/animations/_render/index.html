    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });

        var subs = [
          [0.000, 5.856, "三分钟，回顾中考数学核心考点：几何与综合。"],

          [5.856, 8.800, "几何题先看对象。"],
          [8.800, 14.500, "三角形先问：有没有边角相等、直角、平行线或比例关系。"],
          [14.500, 18.500, "全等用来得到相等的边和角。"],
          [18.500, 21.000, "相似用来得到比例。"],
          [21.000, 24.000, "直角常把勾股和斜边中线带出来。"],
          [24.000, 27.200, "四边形先分清类型。"],
          [27.200, 37.300, "平行四边形看对边、对角和对角线；特殊四边形再加条件。"],
          [37.300, 40.000, "面积题先找底和高。"],
          [40.000, 42.700, "圆题要先连圆心。"],
          [42.700, 49.000, "垂径定理：直径垂直于弦，会平分弦，也平分对应的弧。"],
          [49.000, 52.400, "同弧所对的圆周角相等。"],
          [52.400, 56.200, "同一条弧上，圆心角是圆周角的两倍。"],
          [56.200, 61.128, "看到切线，把半径连到切点，再证垂直。"],

          [61.128, 65.504, "看到中点，想到中位线、倍长中线或平行四边形。"],
          [65.504, 70.004, "看到角平分线，想到等角、性质、全等或相似。"],
          [70.004, 74.304, "看到直角，想到勾股、HL 和斜边中线。"],
          [74.304, 79.504, "看到平行，想到角相等、相似和平行四边形。"],
          [79.504, 82.900, "看到圆，先连接圆心和半径。"],
          [82.900, 89.376, "看到切线，先连半径再证垂直。"],

          [89.376, 93.504, "综合题先抓入口，但图形要跟着问题变。"],
          [93.504, 102.004, "动点题先设变量，画出点从哪里走到哪里。"],
          [102.004, 110.004, "面积题先找底和高，必要时用割补。"],
          [110.004, 118.204, "最值题常转成二次函数、线段最短或三边关系。"],
          [118.204, 125.704, "存在性问题先定分类标准，避免漏情况。"],
          [125.704, 133.632, "函数几何综合，把图形条件转成坐标、方程或函数关系。"],

          [133.632, 137.204, "压轴题不一定一次做完。"],
          [137.204, 140.404, "第一问要稳拿。"],
          [140.404, 143.704, "第二问先找明显关系。"],
          [143.704, 148.304, "最后一问做不完，也要写下变量、关系式、分类或图形关系。"],
          [148.304, 150.816, "步骤分来自有依据的数学关系。"],

          [150.816, 154.504, "最容易丢分的位置要提前防住。"],
          [154.504, 161.804, "几何题常丢在条件、辅助线、相似比例、半径和切线上。"],
          [161.804, 168.304, "综合题常丢在变量范围、分类讨论、最值条件和单位。"],
          [168.304, 174.552, "越到后面，越先写清设什么、求什么、条件是什么。"],

          [174.552, 179.704, "几何与综合题先抓入口：条件通向方法，方法生成关系式。"],
          [179.704, 183.704, "圆题先连圆心，综合题先设变量。"],
          [183.704, 190.416, "压轴题做不完，也要写出关键关系，争取步骤分。"]
        ];

        var subEl = document.getElementById("sub-text");
        subs.forEach(function(s) {
          tl.call(function() {
            subEl.textContent = s[2];
            gsap.to(subEl, { opacity: 1, duration: 0.2 });
          }, null, s[0]);
          tl.call(function() {
            gsap.to(subEl, { opacity: 0, duration: 0.15 });
          }, null, Math.max(s[0] + 0.1, s[1] - 0.1));
        });

        tl.to({}, { duration: 0.01 }, 190.406);
        window.__timelines["root"] = tl;
      })();
    </script>
