<template id="scene-06-domain-template">
  <div

    data-width="1080"

          <line class="ax" x1="80" y1="40" x2="80" y2="458" stroke="#1a1a1a" stroke-width="5" />
          <polygon class="ax" points="80,40 72,56 88,56" fill="#1a1a1a" />

          <text class="ax ylab" x="104" y="60" text-anchor="start" font-family="Fredoka" font-size="52" font-style="italic" font-weight="700" fill="#1a1a1a">y</text>

          <path class="curve"

          <!-- 单调性箭头：左半 ↘ (x增y减), 右半 ↗ (x增y增) -->

            <polygon points="470 200 462 218 478 214" fill="#ff1493" />

          </g>

          <!-- 定义域：x轴下方横括号 [0,4], 两端斜线张开(左端与y轴相交) + "定义域" -->
          <g class="domain">
            <path d="M 80 446 L 100 468 L 560 468 L 580 446" fill="none" stroke="#0047ab" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
            <text x="330" y="514" text-anchor="middle" font-family="ZCOOL KuaiLe, Noto Sans SC" font-size="54" fill="#0047ab">定义域</text>

          <!-- 值域：y轴左侧竖括号 [-1,3], 两端斜线张开 + "值域" -->

        </svg>

        <!-- 末句总结：研究对象 = 表达式 + 定义域 -->
        <div class="summary">
          <span class="s-expr">表达式</span>
          <span class="s-plus">+</span>
          <span class="s-dom">定义域</span>
        </div>
      </div>
    </div>

    <style>
      [data-composition-id="scene-06-domain"] {
        --bg: #fff7e8; --ink: #1a1a1a;
        --pink: #ff1493; --blue: #0047ab;
        --yellow: #ffe000; --green: #009b77;
        --paper: #ffffff;
        position: relative; width: 1080px; height: 1920px;
        overflow: hidden; background: transparent;
        font-family: "Nunito", "Noto Sans SC", sans-serif; color: var(--ink);
      }
      [data-composition-id="scene-06-domain"] .panel {
        position: absolute; top: 480px; left: 0; right: 0; height: 960px;
        background: var(--bg); overflow: hidden;
      }
      [data-composition-id="scene-06-domain"] .corner { position: absolute; opacity: 0; }
      [data-composition-id="scene-06-domain"] .corner.tl { top: 40px; left: 44px; }
      [data-composition-id="scene-06-domain"] .corner.br { bottom: 40px; right: 44px; }
      [data-composition-id="scene-06-domain"] .tile {
        width: 60px; height: 60px; border-radius: 50%; position: relative;

      [data-composition-id="scene-06-domain"] .tile::after {
        content: ""; position: absolute; inset: 16px; border-radius: 50%; background: var(--ink);
      }
      [data-composition-id="scene-06-domain"] .tile.t-green { background: var(--green); }
      [data-composition-id="scene-06-domain"] .tile.t-pink { background: var(--pink); }

      [data-composition-id="scene-06-domain"] .middle {
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: flex-start;
        gap: 16px; padding: 40px 60px 40px;
      }
      [data-composition-id="scene-06-domain"] .badge {
        font-family: "ZCOOL KuaiLe", "Noto Sans SC", sans-serif;
        font-size: 80px; color: var(--paper);
        background: var(--green); padding: 14px 46px;
        border-radius: 28px; border: 5px solid var(--ink);

      [data-composition-id="scene-06-domain"] .q {

      }

      [data-composition-id="scene-06-domain"] .graph { opacity: 0; flex-shrink: 0; }
      [data-composition-id="scene-06-domain"] .symaxis { opacity: 0; }
      [data-composition-id="scene-06-domain"] .symlabel { opacity: 0; }
      [data-composition-id="scene-06-domain"] .mono { opacity: 0; }
      [data-composition-id="scene-06-domain"] .domain { opacity: 0; }
      [data-composition-id="scene-06-domain"] .range { opacity: 0; }
      [data-composition-id="scene-06-domain"] .proj { opacity: 0; }

        border: 5px solid var(--ink);

        opacity: 0;
      }
      [data-composition-id="scene-06-domain"] .l-domain { background: var(--blue); }
      [data-composition-id="scene-06-domain"] .l-range { background: var(--green); }

      [data-composition-id="scene-06-domain"] .summary {
        display: flex; align-items: center; gap: 20px; opacity: 0;
      }
      [data-composition-id="scene-06-domain"] .summary span {
        font-family: "ZCOOL KuaiLe", "Noto Sans SC", sans-serif;
        font-size: 50px; padding: 12px 32px; border-radius: 20px;
        border: 5px solid var(--ink); box-shadow: 8px 8px 0 0 var(--ink);
      }
      [data-composition-id="scene-06-domain"] .s-expr { background: var(--yellow); color: var(--ink); }
      [data-composition-id="scene-06-domain"] .s-plus {
        font-family: "Fredoka", sans-serif; font-weight: 700;
        font-size: 56px; color: var(--ink); border: none; box-shadow: none; padding: 0;
      }
      [data-composition-id="scene-06-domain"] .s-dom { background: var(--blue); color: var(--paper); }
    </style>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.from(".panel", { scaleY: 0, transformOrigin: "50% 50%", duration: 0.5, ease: "back.out(1.5)" }, 0);
        tl.to(".corner", { opacity: 1, duration: 0.3, stagger: 0.08, ease: "power2.out" }, 0.2);

        tl.fromTo(".badge",
          { y: -40, scale: 0.6, opacity: 0 },
          { y: 0, scale: 1, opacity: 1, duration: 0.55, ease: "back.out(2)" },
          0.4
        );

        // 提问 (配音"看的范围不同,性质也不一样" 约 2.9s)
        tl.fromTo(".q",
          { y: 24, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.5, ease: "power2.out" },
          2.9
        );

        // 抛物线 (配音"还是这个式子" 约 6.4s)
        tl.fromTo(".graph",
          { y: 30, scale: 0.92, opacity: 0 },
          { y: 0, scale: 1, opacity: 1, duration: 0.6, ease: "back.out(1.6)" },
          6.4
        );

        // 对称轴竖虚线 (配音"在对称轴的左边" 约 8.0s, 单调性前)
        tl.fromTo(".symaxis",
          { opacity: 0, scaleY: 0, transformOrigin: "320px 255px" },
          { opacity: 1, scaleY: 1, duration: 0.6, ease: "power3.out" },
          8.0
        );
        tl.to(".symlabel", { opacity: 1, duration: 0.4 }, 8.5);

        // 单调性 (配音"对称轴左边x越大y越小" 9.4s / "右边x越大y越大" 12.7s)
        tl.fromTo(".m-left",
          { opacity: 0, y: 20 },
          { opacity: 1, y: 0, duration: 0.55, ease: "power2.out" },
          9.4
        );
        tl.fromTo(".m-right",
          { opacity: 0, y: 20 },
          { opacity: 1, y: 0, duration: 0.55, ease: "power2.out" },
          12.7
        );

        // 定义域 (配音"我们观测的这段x叫定义域" 约 14.6s)
        tl.fromTo(".domain",
          { opacity: 0, y: 16 },
          { opacity: 1, y: 0, duration: 0.6, ease: "back.out(1.7)" },
          14.6
        );

        // 值域 (配音"在定义域内计算得到的y叫值域" 约 17.5s)
        tl.fromTo(".proj-min",
          { opacity: 0 },
          { opacity: 1, duration: 0.5 },
          17.2
        );
        tl.fromTo(".range",
          { opacity: 0, x: -16 },
          { opacity: 1, x: 0, duration: 0.6, ease: "back.out(1.7)" },
          17.6
        );

        // 总结：研究对象=表达式+定义域 (配音"而是 表达式 加 定义域" 约 26.6s)
        tl.fromTo(".summary",
          { y: 30, scale: 0.85, opacity: 0 },
          { y: 0, scale: 1, opacity: 1, duration: 0.6, ease: "back.out(1.8)" },
          26.6
        );

        tl.to({}, { duration: 0.01 }, 29.99);

        window.__timelines["scene-06-domain"] = tl;
      })();
    </script>
  </div>
