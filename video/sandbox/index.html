<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="hyperframes:width" content="1920">
  <meta name="hyperframes:height" content="1080">
  <meta name="hyperframes:duration" content="5">
  <title>ZEROBASE HyperFrames Sandbox</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main
    class="frame"
    data-composition-id="zerobase-sandbox"
    data-width="1920"
    data-height="1080"
    data-start="0"
    aria-label="ZEROBASE title card"
  >
    <h1 class="title">ZEROBASE</h1>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    const compositionId = "zerobase-sandbox";
    window.__timelines = window.__timelines || {};

    const master = gsap.timeline({ paused: true });
    window.__timelines[compositionId] = master;

    master
      .addLabel("scene-01", 0)
      .from(".title", {
        opacity: 0,
        scale: 0.92,
        y: 32,
        duration: 0.8,
        ease: "power3.out"
      }, "scene-01")
      .to(".title", {
        letterSpacing: "0.18em",
        duration: 3.4,
        ease: "none"
      }, "scene-01+=0.8")
      .to(".title", {
        opacity: 0,
        scale: 1.04,
        duration: 0.8,
        ease: "power2.in"
      }, 4.2);

    window.hyperframesTimeline = master;
  </script>
</body>
</html>
